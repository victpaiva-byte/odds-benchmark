services:
  - type: web
    name: odds-benchmark
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: SCRAPE_INTERVAL_MINUTES
        value: "60"
    autoDeploy: true

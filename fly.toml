# Fly.io config — `flyctl launch --copy-config` ou `flyctl deploy`
app = "odds-benchmark"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  SCRAPE_INTERVAL_MINUTES = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Coleta agendada precisa do processo vivo
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"  # Puppeteer + Chromium precisa de ao menos 1GB

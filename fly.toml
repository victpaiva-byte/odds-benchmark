app = 'odds-benchmark-broken-sun-250'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  SCRAPE_INTERVAL_MINUTES = '60'
  SERVER_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
